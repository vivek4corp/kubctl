name: Terraform Drift Detection

on:
  workflow_dispatch:
  schedule:
    # Daily at 02:00 UTC. Change this to match the required review cadence.
    - cron: "0 2 * * *"

# This workflow never runs `terraform apply`. Its only external write is a PR
# containing the AI-proposed Terraform source changes.
permissions:
  id-token: write
  contents: write
  pull-requests: write

env:
  TF_WORKING_DIR: ./environments/dev

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Detect drift
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          set +e
          terraform plan -out=tfplan -detailed-exitcode -input=false > terraform-initial-plan.log 2>&1
          exit_code=$?
          set -e
          if [ "$exit_code" -ne 0 ] && [ "$exit_code" -ne 2 ]; then
            echo "Terraform plan failed with exit code $exit_code" >&2
            exit 1
          fi
          terraform show -json tfplan > tfplan.json
          terraform show -json > tfstate.json

          # The JSON plan is the source of truth. This also handles Terraform
          # wrappers that do not preserve the detailed exit code.
          if jq -e '[.resource_changes[]? | select(.change.actions != ["no-op"])] | length > 0' tfplan.json > /dev/null; then
            echo "has_drift=true" >> "$GITHUB_OUTPUT"
            echo "Terraform changes detected; the drift-review PR steps will run."
          else
            echo "has_drift=false" >> "$GITHUB_OUTPUT"
            echo "No Terraform changes detected."
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate pull request review
        if: steps.plan.outputs.has_drift == 'true'
        run: |
          mkdir -p reports
          python scripts/drift.py
          python scripts/ai_remediate.py \
            --drift reports/drift.json \
            --terraform-root ${{ env.TF_WORKING_DIR }} \
            --report reports/ai_remediation.json \
            --patch reports/ai_remediation.patch
          terraform fmt -recursive ${{ env.TF_WORKING_DIR }}
          terraform -chdir=${{ env.TF_WORKING_DIR }} validate
        env:
          MODELS_PAT: ${{ secrets.MODELS_PAT }}

      - name: Plan AI-proposed Terraform changes
        if: steps.plan.outputs.has_drift == 'true'
        id: remediation_plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          set +e
          terraform plan -out=ai-remediation.tfplan -detailed-exitcode -input=false > terraform-ai-remediation-plan.log 2>&1
          exit_code=$?
          set -e
          if [ "$exit_code" -ne 0 ] && [ "$exit_code" -ne 2 ]; then
            echo "Plan for the AI-proposed code failed" >&2
            exit 1
          fi
          if [ "$exit_code" -eq 0 ]; then
            echo "result=no-changes" >> "$GITHUB_OUTPUT"
            echo "AI proposal matches the current infrastructure."
          else
            echo "result=changes-remain" >> "$GITHUB_OUTPUT"
            echo "AI proposal is valid but Terraform still has changes; review the secure plan log."
          fi

      - name: Generate optional diagnostics
        if: steps.plan.outputs.has_drift == 'true'
        continue-on-error: true
        run: |
          python scripts/activitylog.py
          python scripts/report.py
          python scripts/ai.py
        env:
          MODELS_PAT: ${{ secrets.MODELS_PAT }}

      - name: Commit and push AI Terraform changes
        if: steps.plan.outputs.has_drift == 'true'
        id: commit_changes
        shell: bash
        run: |
          terraform_dir="${{ env.TF_WORKING_DIR }}"
          terraform_dir="${terraform_dir#./}"
          mapfile -t changed_files < <(git diff --name-only -- "$terraform_dir")
          safe_files=()
          for file in "${changed_files[@]}"; do
            if [[ "$file" == "$terraform_dir/"*.tf || "$file" == "$terraform_dir/"*.tfvars ]]; then
              safe_files+=("$file")
            else
              echo "Refusing to commit non-Terraform output: $file" >&2
              exit 1
            fi
          done

          if [ "${#safe_files[@]}" -eq 0 ]; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            echo "No AI Terraform source changes were produced."
            exit 0
          fi

          branch="terraform-ai-remediation"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git add -f -- "${safe_files[@]}"
          git commit -m "chore(terraform): adopt detected infrastructure drift"
          git push --force-with-lease --set-upstream origin "$branch"
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Create or update drift review pull request
        if: steps.commit_changes.outputs.created == 'true'
        uses: actions/github-script@v7
        env:
          BRANCH: terraform-ai-remediation
          PLAN_RESULT: ${{ steps.remediation_plan.outputs.result }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = 'Terraform drift review (dev)';
            const body = `Terraform detected infrastructure drift in the \`dev\` environment.

            This PR contains only AI-proposed Terraform source changes. The workflow ran \`terraform validate\` and a post-remediation \`terraform plan\` before opening this PR (result: \`${process.env.PLAN_RESULT}\`). Drift reports, plan/state JSON, AI responses, and diagnostics remain on the runner and are not committed or uploaded. No \`terraform apply\` is run.`;
            const head = `${context.repo.owner}:${process.env.BRANCH}`;
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner, repo: context.repo.repo, state: 'open', head, base: 'main'
            });
            if (pulls.length) {
              await github.rest.pulls.update({ owner: context.repo.owner, repo: context.repo.repo, pull_number: pulls[0].number, title, body });
              await core.summary.addRaw(`PR updated: ${pulls[0].html_url}`).write();
            } else {
              const { data: pull } = await github.rest.pulls.create({
                owner: context.repo.owner, repo: context.repo.repo, title, head: process.env.BRANCH, base: 'main', body
              });
              await core.summary.addRaw(`PR created: ${pull.html_url}`).write();
            }

      - name: Publish summary
        if: always()
        shell: bash
        run: |
          echo "# Terraform Drift Detection" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.plan.outputs.has_drift }}" = "true" ]; then
            echo "Drift detected. A pull request was created or updated for human review; no Terraform apply was run." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No drift detected." >> "$GITHUB_STEP_SUMMARY"
          fi
