name: Terraform Drift Detection Agent

on:
  workflow_dispatch:

  schedule:
    - cron: "0 2 * * *"     # Daily at 2 AM UTC

permissions:
  id-token: write
  contents: read

env:
  TF_WORKING_DIR: ./environments/dev

jobs:

  drift:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    ##########################################################
    # Azure Login (OIDC)
    ##########################################################

    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    ##########################################################
    # Terraform
    ##########################################################

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Version
      run: terraform version

    - name: Terraform Init
      working-directory: ${{ env.TF_WORKING_DIR }}
      run: terraform init

    ##########################################################
    # Detect Drift
    ##########################################################

    - name: Terraform Plan
      id: plan
      working-directory: ${{ env.TF_WORKING_DIR }}
      run: |
        terraform plan \
          -out=tfplan \
          -detailed-exitcode \
          -input=false
      continue-on-error: true

    ##########################################################
    # Export JSON
    ##########################################################

    - name: Export Plan JSON
      if: always()
      working-directory: ${{ env.TF_WORKING_DIR }}
      run: terraform show -json tfplan > tfplan.json

    ##########################################################
    # Python
    ##########################################################

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scripts/requirements.txt
  ##########################################################
  # Create Reports Directory
  ##########################################################
  
    - name: Create Reports Directory
      run: mkdir -p reports

    ##########################################################
    # Parse Terraform Drift
    ##########################################################

    - name: Analyze Drift
      run: python scripts/drift.py

    ##########################################################
    # Azure Activity Logs
    ##########################################################

    - name: Find Who Changed Infrastructure
      run: python scripts/activitylog.py

    ##########################################################
    # Generate HTML Report
    ##########################################################

    - name: Generate Report
      run: python scripts/report.py

    ##########################################################
    # AI Summary (GitHub Models)
    ##########################################################

    - name: AI Summary
      env:
        GITHUB_TOKEN_AI: ${{ secrets.GITHUB_TOKEN_AI }}
      run: python scripts/ai.py

    ##########################################################
    # Upload Reports
    ##########################################################

    - name: Upload Reports
      uses: actions/upload-artifact@v4
      with:
        name: terraform-drift-report
        path: reports/

    ##########################################################
    # Upload Terraform Plan
    ##########################################################

    - name: Upload Terraform Plan
      uses: actions/upload-artifact@v4
      with:
        name: tfplan-json
        path: terraform/tfplan.json

    ##########################################################
    # Job Summary
    ##########################################################

    - name: Publish Summary
      run: |
        echo "## Terraform Drift Detection" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ Terraform Plan Completed" >> $GITHUB_STEP_SUMMARY
        echo "✅ Drift Analysis Completed" >> $GITHUB_STEP_SUMMARY
        echo "✅ Azure Activity Logs Queried" >> $GITHUB_STEP_SUMMARY
        echo "✅ AI Summary Generated" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "See uploaded artifacts for the detailed report."
