name: Terraform Drift Detection Agent

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  pull-requests: write

env:
  TF_WORKING_DIR: ./environments/dev


jobs:

  drift:

    runs-on: ubuntu-latest


    steps:


    ##########################################################
    # Checkout
    ##########################################################

    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0



    ##########################################################
    # Configure Git
    ##########################################################

    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"



    ##########################################################
    # Azure Login
    ##########################################################

    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}



    ##########################################################
    # Terraform Setup
    ##########################################################

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3



    ##########################################################
    # Terraform Init
    ##########################################################

    - name: Terraform Init
      working-directory: ${{ env.TF_WORKING_DIR }}
      run: terraform init



    ##########################################################
    # Terraform Plan
    ##########################################################

    - name: Terraform Plan
      working-directory: ${{ env.TF_WORKING_DIR }}
      run: |

        terraform plan \
        -out=tfplan \
        -detailed-exitcode \
        -input=false

      continue-on-error: true



    ##########################################################
    # Export Terraform Plan
    ##########################################################

    - name: Export Plan JSON
      working-directory: ${{ env.TF_WORKING_DIR }}
      run: |

        terraform show \
        -json tfplan \
        > tfplan.json



    ##########################################################
    # Export Terraform State
    ##########################################################

    - name: Export State JSON
      working-directory: ${{ env.TF_WORKING_DIR }}
      run: |

        terraform show \
        -json \
        > tfstate.json




    ##########################################################
    # Python Setup
    ##########################################################

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"



    - name: Install Python Dependencies
      run: |

        python -m pip install --upgrade pip

        pip install -r scripts/requirements.txt



    ##########################################################
    # Reports Folder
    ##########################################################

    - name: Create Reports Folder
      run: mkdir -p reports



    ##########################################################
    # Drift Analysis
    ##########################################################

    - name: Analyze Terraform Drift
      run: |

        python scripts/drift.py



    ##########################################################
    # Azure Activity Analysis
    ##########################################################

    - name: Analyze Azure Activity Logs
      run: |

        python scripts/activitylog.py



    ##########################################################
    # HTML Report
    ##########################################################

    - name: Generate HTML Report
      run: |

        python scripts/report.py



    ##########################################################
    # AI Summary
    ##########################################################

    - name: Generate AI Summary
      env:

        MODELS_PAT: ${{ secrets.MODELS_PAT }}

      run: |

        python scripts/ai.py




    ##########################################################
    # Terraform Module Resolver
    ##########################################################

    - name: Resolve Terraform Modules
      run: |

        python scripts/module_resolver.py



    ##########################################################
    # Terraform Inventory
    ##########################################################

    - name: Terraform Inventory
      run: |

        python scripts/terraform_inventory.py




    ##########################################################
    # Parse Terraform
    ##########################################################

    - name: Parse Terraform Configuration
      run: |

        python scripts/terraform_parser.py \
        --repo . \
        --output reports/terraform_resources.json




    ##########################################################
    # Generate Change Request
    ##########################################################

    - name: Generate Terraform Change Request
      run: |

        python scripts/change_generator.py \
        --drift reports/drift.json \
        --output reports/change_requests.json




    ##########################################################
    # Generate Terraform Patch
    ##########################################################

    - name: Generate Terraform Patch
      run: |

        python scripts/terraform_modifier.py \
        --resources reports/terraform_resources.json \
        --changes reports/change_requests.json \
        --output reports/terraform_patch.json




    ##########################################################
    # Update Terraform Code
    ##########################################################

    - name: Update Terraform Code
      run: |

        python scripts/terraform_writer.py \
        --patch reports/terraform_patch.json \
        --report reports/writer_report.json




    ##########################################################
    # Terraform Validation
    ##########################################################

    - name: Validate Terraform
      run: |

        python scripts/terraform_validator.py \
        --path ${{ env.TF_WORKING_DIR }} \
        --report reports/terraform_validation.json




    ##########################################################
    # Commit Terraform Changes
    ##########################################################

    - name: Commit Terraform Changes
      env:

        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      run: |

        python scripts/git_manager.py \
        --repo . \
        --message "Automated Terraform drift remediation" \
        --report reports/git_operation.json




    ##########################################################
    # Create Pull Request
    ##########################################################

    - name: Create Pull Request
      env:

        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      run: |

        python scripts/pr_creator.py \
        --repository ${{ github.repository }} \
        --source $(git branch --show-current) \
        --target main \
        --token $GITHUB_TOKEN \
        --report reports/pr_creation.json




    ##########################################################
    # Upload Reports
    ##########################################################

    - name: Upload Reports
      if: always()

      uses: actions/upload-artifact@v4

      with:

        name: terraform-drift-reports

        path: reports/




    ##########################################################
    # Upload Terraform Files
    ##########################################################

    - name: Upload Terraform Plan

      if: always()

      uses: actions/upload-artifact@v4

      with:

        name: terraform-plan

        path: |

          ${{ env.TF_WORKING_DIR }}/tfplan

          ${{ env.TF_WORKING_DIR }}/tfplan.json

          ${{ env.TF_WORKING_DIR }}/tfstate.json




    ##########################################################
    # GitHub Summary
    ##########################################################

    - name: Publish Summary

      if: always()

      run: |


        echo "# 🚀 Terraform Drift Detection Agent" >> $GITHUB_STEP_SUMMARY

        echo "" >> $GITHUB_STEP_SUMMARY


        echo "## Completed Steps" >> $GITHUB_STEP_SUMMARY

        echo "- Terraform Plan" >> $GITHUB_STEP_SUMMARY

        echo "- Drift Detection" >> $GITHUB_STEP_SUMMARY

        echo "- Azure Activity Analysis" >> $GITHUB_STEP_SUMMARY

        echo "- AI Summary" >> $GITHUB_STEP_SUMMARY

        echo "- Terraform Inventory" >> $GITHUB_STEP_SUMMARY

        echo "- Terraform Parsing" >> $GITHUB_STEP_SUMMARY

        echo "- Change Request Generation" >> $GITHUB_STEP_SUMMARY

        echo "- Terraform Patch Generation" >> $GITHUB_STEP_SUMMARY

        echo "- Terraform Code Update" >> $GITHUB_STEP_SUMMARY

        echo "- Terraform Validation" >> $GITHUB_STEP_SUMMARY

        echo "- Git Commit" >> $GITHUB_STEP_SUMMARY

        echo "- Pull Request Creation" >> $GITHUB_STEP_SUMMARY



        if [ -f reports/summary.md ]; then

          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## AI Summary" >> $GITHUB_STEP_SUMMARY

          cat reports/summary.md >> $GITHUB_STEP_SUMMARY

        fi


        if [ -f reports/pr_creation.json ]; then

          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Pull Request Details" >> $GITHUB_STEP_SUMMARY

          cat reports/pr_creation.json >> $GITHUB_STEP_SUMMARY

        fi
