name: Terraform Drift Detection Agent

on:

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to check"
        required: true
        default: dev

  schedule:
    - cron: "0 2 * * *"


permissions:
  id-token: write
  contents: write
  pull-requests: write


env:

  TF_VERSION: "1.8.5"

  TF_WORKING_DIR: ./environments/dev



jobs:

# --------------------------------------------------
# Detect Terraform Drift
# --------------------------------------------------

  drift-check:

    name: Terraform Drift Detection

    runs-on: ubuntu-latest


    steps:


    - name: Checkout repository
      uses: actions/checkout@v4



    - name: Azure Login using OIDC
      uses: azure/login@v2

      with:

        client-id: ${{ secrets.AZURE_CLIENT_ID }}

        tenant-id: ${{ secrets.AZURE_TENANT_ID }}

        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}



    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

      with:

        terraform_version: ${{ env.TF_VERSION }}



    - name: Terraform Init
      working-directory: ${{ env.TF_WORKING_DIR }}

      run: |

        terraform init



    - name: Terraform Plan

      id: plan

      working-directory: ${{ env.TF_WORKING_DIR }}

      continue-on-error: true

      run: |

        terraform plan \
        -detailed-exitcode \
        -out=tfplan



    - name: Convert Plan to JSON

      if: steps.plan.outcome == 'failure'

      working-directory: ${{ env.TF_WORKING_DIR }}

      run: |

        terraform show \
        -json tfplan \
        > plan.json



    - name: Upload Terraform Plan

      if: always()

      uses: actions/upload-artifact@v4

      with:

        name: terraform-drift-plan

        path:

          ${{ env.TF_WORKING_DIR }}/plan.json




# --------------------------------------------------
# Drift Analysis
# --------------------------------------------------

    - name: Install Python dependencies

      run: |

        pip install requests



    - name: Run Drift Analyzer

      if: steps.plan.outcome == 'failure'

      run: |

        python scripts/drift.py \
        ${{ env.TF_WORKING_DIR }}/plan.json




# --------------------------------------------------
# Create Pull Request
# --------------------------------------------------

    - name: Create Drift Fix PR

      if: steps.plan.outcome == 'failure'

      env:

        GH_TOKEN: ${{ github.token }}


      run: |

        python scripts/github_pr.py
